<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSD2 Consent - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .app-info {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
        }
        
        .app-info strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .app-info span {
            color: #667eea;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .security-note {
            margin-top: 20px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 6px;
            font-size: 12px;
            color: #856404;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 PSD2 Authentication</h1>
            <p>Secure Payment Authorization</p>
        </div>
        
        <div class="app-info" id="appInfo">
            <strong>Application requesting access:</strong>
            <span id="appName">Loading...</span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn">Continue to Authorization</button>
        </form>
        
        <div class="security-note">
            🔒 This is a secure PSD2 consent flow. Your credentials are transmitted securely.
        </div>
    </div>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const originalUrl = urlParams.get('original-url');
        const stateNonce = urlParams.get('state_nonce');
        const appName = urlParams.get('app-name');
        
        // Extract consentid from the original-url parameter
        let consentId = null;
        if (originalUrl) {
            try {
                const originalUrlObj = new URL(originalUrl);
                consentId = originalUrlObj.searchParams.get('consentid');
                console.log('Extracted consentId from original-url:', consentId);
            } catch (e) {
                console.error('Error parsing original-url:', e);
            }
        }
        
        // Display app name
        if (appName) {
            document.getElementById('appName').textContent = decodeURIComponent(appName);
        } else {
            document.getElementById('appName').textContent = 'Unknown Application';
        }
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Build consent URL with consentId if available
            let consentUrl = `/consent?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&original-url=${encodeURIComponent(originalUrl)}&state_nonce=${encodeURIComponent(stateNonce)}&app-name=${encodeURIComponent(appName)}`;
            
            if (consentId) {
                consentUrl += `&consentId=${encodeURIComponent(consentId)}`;
            }
            
            window.location.href = consentUrl;
        });
    </script>
</body>
</html>
